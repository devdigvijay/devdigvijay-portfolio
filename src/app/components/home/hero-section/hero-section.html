<section>
    <div class="container">
        <div>
            <div class="w-full h-72">
                <img ngSrc="/images/hero-sec/banner-bg-img.png" alt="banner-img" width="1080" height="267"
                    class="w-full h-full object-cover">
            </div>
            <div class="border-x border-primary/10">
                <div
                    class="relative flex flex-col xs:flex-row items-center xs:items-start justify-center xs:justify-between max-w-3xl mx-auto gap-10 xs:gap-3 px-4 sm:px-7 pt-22 pb-8 sm:pb-12">
                    <div class="absolute top-0 transform -translate-y-1/2">
                        <img ngSrc="/images/hero-sec/user-img.png" alt="user-img" width="145" height="145"
                            class="border-4 border-white rounded-full">
                        <span
                            class="absolute bottom-2.5 right-5 w-4 h-4 bg-green-500 border-2 border-white rounded-full">
                        </span>
                    </div>
                    <div class="flex flex-col gap-2 sm:gap-3 items-center text-center xs:items-start">
                        <h1>{{ Name() }}</h1>
                        <p class="text-violet-700 font-normal">
                            {{ Designation() }}
                        </p>
                        <div class="flex items-center gap-2">
                            <img ngSrc="/images/icon/map-icon.svg" alt="map-icon" width="20" height="20">
                            <p class="text-primary">
                                {{ Location() }}
                            </p>
                        </div>
                    </div>
                    <div class="flex flex-col md:flex-row items-center gap-4">
                        <div class="flex items-center gap-2">
                            @for (social of socialIcons(); track $index) {
                            <a [href]="social.href"
                                class="w-fit p-2.5 sm:p-3.5 hover:bg-primary/5 border border-primary/10 rounded-full">
                                <img [src]="social.img" [alt]="social.icon" width="18" height="18">

                            </a>
                            }
                        </div>
                        <a href="mailto:hello@devdigvijay.com"
                            class="inline-block p-0.5 rounded-full bg-[linear-gradient(96.09deg,_#9282F8_12.17%,_#F3CA4D_90.71%)]">
                            <span
                                class="flex items-center gap-3 bg-primary hover:bg-[linear-gradient(96.09deg,_#9282F8_12.17%,_#F3CA4D_90.71%)] py-2.5 px-5 rounded-full">
                                <img ngSrc="/images/icon/spark-icon.svg" alt="spark-icon" width="14" height="14">
                                <span class="text-sm sm:text-base font-semibold text-white"> Connect </span>
                            </span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
