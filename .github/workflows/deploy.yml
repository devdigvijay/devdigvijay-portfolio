name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main  # Change to your default branch if different (e.g., master)
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Change to match your project's Node version
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --configuration production
        # Replace <YOUR_REPO_NAME> with your actual GitHub repository name
        # Example: --base-href "/my-portfolio/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist/dev-digvijay/browser"
          # For Angular 16 and below, use: ./dist/<YOUR_APP_NAME>
          # Replace <YOUR_APP_NAME> with your Angular app name from angular.json

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
